<!-- 最新のHTMLファイルだよとブラウザに共有するための宣言 -->
<!DOCTYPE html>
<!-- HTMLファイルがどの言語で書かれているか -->
<html lang="ja">
<!-- 情報の管理 -->

<head>
    <!-- 文字化けしないための対策 -->
    <meta charset="UTF-8">
    <!-- レスポンシブデザイン対応するための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- webページのタイトル -->
    <title>はじめてのHTML</title>
</head>
<!-- webページの要素（ユーザーに届けたい情報） -->

<body>
    <!-- 見出し（h1~h6） -->
    <h1>こんにちは。</h1>
    <!-- 段落 -->
    <p>私はT1Aの学生です。</p>
    <!-- リスト -->
    <!-- 黒丸のリスト -->
    <ul>
        <li>いちご</li>
        <li>りんご</li>
        <li>ぶどう</li>
        <li>みかん</li>
    </ul>
    <!-- 数字のリスト -->
    <ol>
        <li>いちご</li>
        <li>りんご</li>
        <li>ぶどう</li>
        <li>みかん</li>
    </ol>
    <!-- 画像の挿入 img sec="画像のディレクトリ" alt="画像が表示されないときの変わりのテキスト" -->
    <img src="/0420/ゼニガメ z.avif" alt="ゼニガメの画像">
</body>
</body>

</html>
